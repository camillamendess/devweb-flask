<!-- Template de listagem de inscritos - estende o layout base e exibe todos os alunos inscritos com a opção de excluir cada um -->
{% extends "layout.html" %}

{% block body %}

<!-- Tabela de inscritos: itera sobre a lista recebida do InscritoController e exibe nome, minicurso e ação por linha -->
<h2>Lista de Alunos Inscritos</h2>

<table border="1" aria-label="Alunos inscritos e seus respectivos minicursos">
    <thead>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Minicurso</th>
            <th scope="col">Ação</th>
        </tr>
    </thead>
    <tbody>
        {% for inscrito in inscritos %}
        <tr>
            <td>{{ inscrito.nome }}</td>
            <!-- Nome do minicurso obtido via JOIN no InscritoDAO, evitando consultas adicionais -->
            <td>{{ inscrito.minicurso_nome }}</td>
            <!-- Formulário de exclusão: envia o ID do inscrito via POST e exige confirmação do usuário antes de deletar -->
            <td>
                <form action="/excluir" method="post" style="display:inline;">
                    <input name="id" type="hidden" value='{{ inscrito.id }}'>
                    <button type="submit"
                        onclick="return confirm('Tem certeza que deseja excluir a inscrição de {{ inscrito.nome }}?')">Excluir</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br>
<!-- Link de retorno ao formulário principal de inscrição -->
<div class="button-container"><button href="/"><a>Voltar ao Formulário</a></button></div>

{% endblock %}
