{% extends "layout.html" %}

{% block body %}

<!-- Formulário de edição: envia o nome atualizado via POST para o MinicursoController, identificando o minicurso pelo ID na URL -->
<h2>Editar Nome do Minicurso</h2>
<p>Altere o título do minicurso abaixo. Essa mudança vai refletir imediatamente no formulário de inscrição.</p>

<form class="formulario" action="/minicursos/editar/{{ minicurso.id }}" method="POST"
  aria-label="Formulário de edição de minicurso">

  <!-- Campo de nome: pré-preenchido com o valor atual do minicurso recebido do MinicursoController -->
  <div class="campo">
    <label for="nome">Nome do Minicurso:</label>
    <input type="text" id="nome" name="nome" value="{{ minicurso.nome }}" required aria-required="true"
      placeholder="Ex: Inteligência Artificial">
  </div>

  <div class="campo">
    <button type="submit">Atualizar Minicurso</button>
  </div>
</form>

<!-- Link de cancelamento: retorna para a listagem de minicursos sem salvar as alterações -->
<div class="button-container">
  <button href="/minicursos"><a>Cancelar e Voltar</a></button>
</div>

{% endblock %}
